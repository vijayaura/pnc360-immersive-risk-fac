apiVersion: apps/v1
kind: Deployment
metadata:
  name: pnc360-frontend
  namespace: pnc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pnc360-frontend
  template:
    metadata:
      labels:
        app: pnc360-frontend
    spec:
      serviceAccountName: pnc-sa
      containers:
        - name: pnc360-frontend
          image: pnc360-frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          # ADDED: readiness probe (REQUIRED)
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          # option added
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10

          volumeMounts:
            - name: secrets
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: pnc-frontend-secrets
