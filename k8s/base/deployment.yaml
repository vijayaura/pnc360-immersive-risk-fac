apiVersion: apps/v1
kind: Deployment
metadata:
  name: pnc360-frontend
  namespace: pnc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pnc360-frontend
  template:
    metadata:
      labels:
        app: pnc360-frontend
    spec:
      containers:
        - name: pnc360-frontend
          image: pnc360-frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          volumeMounts:
            - name: secrets
              mountPath: /mnt/secrets-store
              readOnly: true

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi

      volumes:
        - name: secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: pnc-frontend-secrets
